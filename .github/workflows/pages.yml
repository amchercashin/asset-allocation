name: Update inflation and deploy Pages

on:
  push:
    branches:
      - master
  schedule:
    - cron: "17 4 * * 2"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out master
        uses: actions/checkout@v7
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install updater dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Update inflation from Rosstat
        if: github.event_name != 'push'
        run: python scripts/update_inflation.py

      - name: Run data and compatibility tests
        run: python -m unittest discover -s tests -v

      - name: Check JavaScript syntax
        run: find . -type f -name '*.js' -not -path './.git/*' -print0 | xargs -0 -n1 node --check

      - name: Commit updated inflation data
        if: github.event_name != 'push'
        run: |
          if git diff --quiet -- data/inflation-monthly.json ipc_data.js; then
            echo "Inflation data is already current."
            exit 0
          fi
          latest_period="$(python -c 'import json; print(json.load(open("data/inflation-monthly.json"))["latest_period"])')"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/inflation-monthly.json ipc_data.js
          git commit -m "data: update CPI through ${latest_period}"
          git push origin HEAD:master

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Stage static site
        run: |
          mkdir _site
          rsync -a \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '_site/' \
            --exclude 'certs/' \
            --exclude 'data/' \
            --exclude 'docs/' \
            --exclude 'scripts/' \
            --exclude 'tests/' \
            --exclude 'README.md' \
            --exclude 'requirements.txt' \
            ./ _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
